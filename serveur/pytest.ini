[pytest]
# Configuration pytest pour ECB Production Manager backend
# Permet d'importer `from tests.conftest import ...` et `from src.* import ...`
pythonpath = src .
testpaths = src/tests
filterwarnings =
    ignore::DeprecationWarning:starlette.*
    ignore::pydantic.PydanticDeprecatedSince20
addopts = -ra --strict-markers
